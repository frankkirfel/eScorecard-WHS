$(document).ready(function() {
	$('.tooltip').tooltipster({
		theme: 'tooltipster-punk',
		'maxWidth': 600, // set max width of tooltip box
		contentAsHTML: true, // set title content to html
		trigger: 'custom', // add custom trigger
		triggerOpen: { // open tooltip when element is clicked, tapped (mobile) or hovered
			click: true,
			tap: true,
			mouseenter: true
		},
		triggerClose: { // close tooltip when element is clicked again, tapped or when the mouse leaves it
			click: true,
			scroll: false, // ensuring that scrolling mobile is not tapping!
			tap: true,
			mouseleave: true
		}
	});



	const pointer_event = ("PointerEvent" in window);
	const touch_event = ("TouchEvent" in window) && !pointer_event;
	
	let svgele = null;
	let pointer_pos_start_abs;
	let pointer_pos_start_rel;
	let svgelem_pos_start = {x: 0, y: 0};
	let dragable = false;

	function get_abs_pointer_pos(e) {
		
		let pointerAbsX = 0, pointerAbsY = 0;
		
		if (touch_event && e.targetTouches && e.targetTouches[0] && e.targetTouches[0].clientX) {
			pointerAbsX = e.targetTouches[0].clientX;
			pointerAbsY = e.targetTouches[0].clientY;
		}
		else if (e.clientX) {
			pointerAbsX = e.clientX;
			pointerAbsY = e.clientY;
		}
		
		return {x: pointerAbsX, y: pointerAbsY};
	} // get_abs_pointer_pos
	
	function get_svg_pos() {

		if (svgele) {
			let svgleft = svgele.style.left;
			let svgtop = svgele.style.top;
			return {x: parseInt(svgleft.replace("px", "")), y: parseInt(svgtop.replace("px", ""))};
		}
		else
			return {x: 0, y: 0};
	}


	function move_svg(e, pos) {
		
		if (svgele && dragable) {
			$(".tooltipster-base").remove();
			svgele.style.left = (parseInt(svgelem_pos_start.x) + parseInt(pos.x) - parseInt(pointer_pos_start_abs.x)) + "px";
			svgele.style.top = (parseInt(svgelem_pos_start.y) + parseInt(pos.y) - parseInt(pointer_pos_start_abs.y)) + "px";
			//console.log("svgX:" + svgele.style.left + " svgY:" + svgele.style.top + " svgStartX:" + svgelem_pos_start.x + " svgStartY:" + svgelem_pos_start.y + " ptrStartX:" + pointer_pos_start_abs.x + " ptrStartY:" + pointer_pos_start_abs.y + " ptrX:" + pos.x + " ptrY:" + pos.y);
			if (e.preventDefault)
				e.preventDefault();
			e.returnValue = false;
		}
		
	} // move_svg
	
	function zoom_svg(e, delta) {

		dragable = true;
		if (svgele) {
			$(".tooltipster-base").remove();
			let svg_width = parseFloat(svgele.getAttribute("width"));
			let svg_height = parseFloat(svgele.getAttribute("height"));

			svgelem_pos_start = get_svg_pos();
			pointer_pos_start_abs = {x: get_abs_pointer_pos(e).x, y: get_abs_pointer_pos(e).y};
			pointer_pos_start_rel = {x: get_abs_pointer_pos(e).x - get_svg_pos().x, y: get_abs_pointer_pos(e).y - get_svg_pos().y};
//			let svg_pos = {x: svg_width / (-20.0) * delta, y: svg_height / (-20.0) * delta};
			svgele.setAttribute("width", svg_width + svg_width / 10.0 * delta);
			svgele.setAttribute("height", svg_height + svg_height / 10.0 * delta);
			let pointer_pos_rel = {x: pointer_pos_start_rel.x - pointer_pos_start_rel.x / 10.0 * delta, y: pointer_pos_start_rel.y - pointer_pos_start_rel.y / 10.0 * delta};
			//console.log("ptrStartX:" + pointer_pos_start_rel.x + " ptrStartY:" + pointer_pos_start_rel.y + " ptrX:" + pointer_pos_rel.x + " ptrY:" + pointer_pos_rel.y + " ptrDeltaX:" + parseInt(pointer_pos_rel.x - pointer_pos_start_rel.x) + " ptrDeltaY:" + parseInt(pointer_pos_rel.y - pointer_pos_start_rel.y));
			move_svg(e, {x: parseInt(pointer_pos_rel.x - pointer_pos_start_rel.x + pointer_pos_start_abs.x), y: parseInt(pointer_pos_rel.y - pointer_pos_start_rel.y + pointer_pos_start_abs.y)});

		}
		dragable = false;
	}

	// *** Event-Handler registration ***

	//document.addEventListener("wheel", wheel, { passive: false });
	document.addEventListener("wheel", handle_wheel, false );
	document.body.addEventListener("keydown", handle_keydown, false);
	if (pointer_event) {
		document.addEventListener("pointerdown", handle_down, false);
		document.addEventListener("pointermove", handle_move, false);
		document.addEventListener("pointerup", handle_up, false);
	}
	else if (touch_event) {
		document.addEventListener("touchstart", handle_down, false);
		document.addEventListener("touchmove", handle_move, false);
		document.addEventListener("touchend", handle_up, false);
	}
	else {
		document.addEventListener("mousedown", handle_down, false);
		document.addEventListener("mousemove", handle_move, false);
		document.addEventListener("mouseup", handle_up, false);
	}
	

	// *** Event-Handler ***
	
	function handle_wheel(e) {

		let delta = 0;
		
		if (!e)
			e = window.event;
		if (e.wheelDelta)
			delta = e.wheelDelta / 120;
		else if (e.detail)
			delta = -e.detail / 3;
		
		if (delta) {
			zoom_svg(e, delta);
		}
		
	} // handle_wheel
	
	function handle_keydown(e) {
		
		const keyCode = e.keyCode;
		let xwert = 0, ywert = 0;
		let delta = 1;
		if (keyCode && (keyCode==27 || keyCode==37 || keyCode==38 || keyCode==39 || keyCode==40)) {
			delta = e.shiftKey?10:1;
			switch(keyCode){
				case 37: // links
					xwert = -delta;
					break;
				case 38: // rauf
					ywert = -delta;
					break;
				case 39: // rechts
					xwert = delta;
					break;
				case 40: // runter
					ywert = delta;
					break;
				case 27: // Escape
					return;
			}
			svgelem_pos_start = get_svg_pos();
			pointer_pos_start_abs = {x: 0, y: 0};
			dragable = true;
			move_svg(e,{x: xwert,y:ywert});
			dragable = false;
		}
		else if (keyCode && (keyCode==109 || keyCode==189 || keyCode==107 || keyCode==187)) {
			delta = e.shiftKey?4:1;
			switch(keyCode){
				case 109: // zoom out
				case 189:
					delta *= (-1);
					break;
				case 107: // zoom in
				case 187:
					delta *= 1;
					break;
			}
			zoom_svg(e, delta);
		}
	} // handleKeyDown
	
	function handle_down(e) {
		
//		document.body.style.touchAction = "none";
		document.body.style.touchAction = "auto";
		document.body.style.cursor = "move";
		dragable = true;
		if (svgele) {
			svgelem_pos_start = get_svg_pos();
		}
		pointer_pos_start_abs = {x: get_abs_pointer_pos(e).x, y: get_abs_pointer_pos(e).y};
	} // handle_down
	
	function handle_move(e) {
		
		move_svg(e, get_abs_pointer_pos(e));
	} // handle_move
	
	function handle_up(e) {
		
		document.body.style.cursor = "default";
		document.body.style.touchAction = "auto";
		dragable = false;
/*		
		console.log("SVG-Left: " + svgelem.style.left);
		console.log("SVG-Top : " + svgelem.style.top);

		svgelem = null;

		console.log("pointerAbsX: " + get_abs_pointer_pos(e).x);
		console.log("pointerAbsY: " + get_abs_pointer_pos(e).y);
		console.log("pointerRelX: " + (get_abs_pointer_pos(e).x - get_svg_pos().x));
		console.log("pointerRelY: " + (get_abs_pointer_pos(e).y - get_svg_pos().y));
*/
	} // handle_up


	// *** CSS ***
	const style = document.createElement('style');
	style.innerText = "body { margin: 0px; overflow: hidden; } " + "svg { position: absolute; touch-action: none; } " + "svg:focus { outline: none; } ";
	document.head.appendChild(style);
	
	if (document.getElementsByTagName("svg")[0]) {
		svgele = document.getElementsByTagName("svg")[0];
		svgele.style.left = "0px";
		svgele.style.top = "0px";
	}
});

	</script>

		JavaScript is required
	</noscript>
